<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav [mode]="mobileQuery.matches ? 'over' : 'side'"
               [fixedInViewport]="mobileQuery.matches"
               [opened]="!mobileQuery.matches && (isAuthenticated$ | async)">
    <div class="sidenav-content">
      <!-- Brand Header -->
      <div class="sidenav-header">
        <a class="brand" routerLink="/dashboard">
          <div class="brand-icon">
            <mat-icon>account_balance_wallet</mat-icon>
          </div>
          <span class="brand-name">FinTrack</span>
        </a>
      </div>

      <!-- Navigation -->
      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active" class="nav-item" [routerLinkActiveOptions]="{exact: true}">
          <mat-icon>grid_view</mat-icon>
          <span>Overview</span>
        </a>
        <a mat-list-item routerLink="/expenses" routerLinkActive="active" class="nav-item">
          <mat-icon>credit_card</mat-icon>
          <span>Expenses</span>
        </a>
        <a mat-list-item routerLink="/investments" routerLinkActive="active" class="nav-item">
          <mat-icon>trending_up</mat-icon>
          <span>Investments</span>
        </a>
      </mat-nav-list>

      <!-- User Section -->
      <div class="user-section" *ngIf="currentUser$ | async as user">
        <div class="user-info">
          <div class="user-avatar">
            <mat-icon>person</mat-icon>
          </div>
          <div class="user-details">
            <span class="user-label">Signed in as</span>
            <span class="user-name">{{ user.name }}</span>
            <span class="user-email">{{ user.email }}</span>
          </div>
        </div>
        <button mat-button class="logout-btn" (click)="logout()">
          <mat-icon>logout</mat-icon>
          Sign Out
        </button>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>

<app-loading-spinner></app-loading-spinner>
